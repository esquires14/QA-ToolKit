# ── Dev profile (H2 in-memory, zero config needed) ──────────────────
spring.datasource.url=jdbc:h2:mem:qatoolkit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# App config
app.base-url=http://localhost:8080
server.port=8080

# CORS — update to your deployed frontend URL before going live
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
