# ── Production profile (PostgreSQL) ─────────────────────────────────
# Set these as environment variables on Railway / Render:
#   DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD, APP_BASE_URL

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

app.base-url=${APP_BASE_URL:https://your-app.onrender.com}
app.cors.allowed-origins=${CORS_ORIGINS:https://your-frontend.netlify.app}

server.port=${PORT:8080}
